# Krusell-Smith (1998) heterogeneous agent model specification.
# Parsed by build_model_from_yaml (ModelParser.jl).

file:
  name: "Krusell Smith Model"
  function_file: "KrusellSmith.jl"

# Model and computational parameters.
# Computational parameters (T, ε, dx) have defaults and can be omitted.
parameters:
  model:
    - name: "β"
      value: 0.98
      description: "Household discount factor"
    - name: "borrow_cons"
      value: 0.0
      description: "Borrowing constraint (lower bound on household wealth)"
    - name: "γ"
      value: 2.0
      description: "Coefficient of relative risk aversion"
    - name: "α"
      value: 0.36
      description: "Capital share in production"
    - name: "δ"
      value: 0.08
      description: "Depreciation rate"

  computational:
    - name: "T"
      value: 150
      description: "Number of transition periods"
    - name: "ε"
      value: 1.0e-6
      description: "Convergence tolerance"
    - name: "dx"
      value: 0.001
      description: "Step size for numerical derivatives"

# Heterogeneity dimensions. Each dimension has a type (endogenous or exogenous),
# a grid_function (built-ins: double_exponential, rouwenhorst_discretization),
# and keyword params passed directly to that function.
# Endogenous dimensions specify the heterogeneous policy variable they aggregate.
# Exogenous grid functions must return (grid::Vector, Π::Matrix).
dimensions:
  - name: "wealth"
    type: "endogenous"
    policy_var: "KD"
    grid_function: "double_exponential"
    params:
      n: 200
      grid_min: 0.0
      grid_max: 200.0

  - name: "productivity"
    type: "exogenous"
    grid_function: "rouwenhorst_discretization"
    params:
      n: 7
      ρ: 0.966
      σ: 0.283

# Aggregate variables. Endogenous variables are solved by Newton; exogenous
# variables follow a specified path (seq_function must return Vector of length T);
# heterogeneous variables are aggregated from the household distribution.
# The single "function" entry under heterogeneous specifies the value function
# F: ∂V/∂a' → (Value=∂V/∂a, <policy vars>...) used for both VFI and backward iteration.
variables:
  endogenous:
    - name: "Y"
      description: "Output"
    - name: "KS"
      description: "Capital supply"
    - name: "r"
      description: "Interest rate"
    - name: "w"
      description: "Wages"

  exogenous:
    - name: "Z"
      description: "Productivity"
      seq_function: "exogenousZ"

  heterogeneous:
    - name: "KD"
      description: "Capital demand (aggregated from household savings policy)"
    - function: "ValueFunction"
      description: "EGM value function: F: ∂V/∂a' → (Value=∂V/∂a, KD=a'). Returns a NamedTuple."

# Equilibrium equations. Lag/lead notation: VAR(-1) for one-period lag, VAR(+1) for lead.
equations:
  - "Y = Z * KS(-1)^α"
  - "r + δ = α * Z * KS(-1)^(α-1)"
  - "w = (1-α) * Z * KS(-1)^α"
  - "KS = KD"

# Steady-state specifications. "fixed" pins exogenous variables to known values;
# "guesses" provides Newton starting values for the free endogenous variables.
# If only "initial" is given, the economy starts and ends at the same steady state.
steady_states:
  initial:
    fixed:
      Z: 1.0
    guesses:
      r: 0.04
      w: 1.0
      Y: 1.5
      KS: 3.5

  ending:
    fixed:
      Z: 2.0
    guesses:
      r: 0.04
      w: 1.5
      Y: 2.0
      KS: 5.0
